<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PaceWave Reader</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Merriweather:wght@400;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0c10; --text:#eef2f7; --muted:#a3adbb;
  --accent:#8A2BE2; --accent-2:#a78bfa;
  --glass:rgba(255,255,255,0.08); --border:rgba(255,255,255,0.12);
  --radius:20px; --maxw:820px;
  --font:Inter; --size:18px;
}
:root.light{
  --bg:#f8fafc; --text:#0f172a; --muted:#64748b;
  --glass:rgba(255,255,255,0.85); --border:rgba(0,0,0,0.08);
}
:root.sepia{
  --bg:#f4ecd8; --text:#3e2f1c; --muted:#7a6a55;
  --glass:rgba(244,236,216,0.95); --border:rgba(62,47,28,0.15);
}

*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--font), system-ui, sans-serif;
  font-size:var(--size); line-height:1.9;
  background:radial-gradient(900px 500px at 85% -10%, rgba(138,43,226,0.22), transparent 60%), var(--bg);
  color:var(--text);
  transition:background.4s, color.4s;
  min-height:100vh;
}

/* Top bar */
.topbar{
  position:sticky; top:0; z-index:50;
  backdrop-filter:blur(16px) saturate(160%); background:var(--glass);
  border-bottom:1px solid var(--border);
  padding:14px 20px; display:flex; align-items:center; justify-content:space-between;
  transition:transform.3s;
}
.topbar.hide{transform:translateY(-100%)}
.logo{font-family:"Playfair Display",serif; font-size:1.3rem; font-weight:700}
.top-actions{display:flex; gap:8px; align-items:center}
.icon-btn{
  background:none; border:0; color:var(--text); font-size:1.2rem;
  padding:8px 10px; border-radius:10px; cursor:pointer;
}
.icon-btn:hover{background:var(--glass)}
.btn{
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  color:white; border:0; padding:10px 18px; border-radius:999px;
  font-weight:600; cursor:pointer; text-decoration:none; font-size:.95rem;
}

/* Progress */
.progress-wrap{height:4px; background:rgba(255,255,255,0.08); position:sticky; top:62px; z-index:40}
.progress{height:100%; width:0%; background:linear-gradient(90deg,var(--accent),var(--accent-2)); transition:width.15s}
.prog-text{font-size:.85rem; color:var(--muted); padding:6px 20px; text-align:center}

/* Reader */
.wrap{max-width:var(--maxw); margin:36px auto; padding:0 20px 140px}
.meta{margin-bottom:20px}
.meta h1{font-family:"Playfair Display",serif; font-size:clamp(1.6rem,4vw,2.4rem); line-height:1.2; margin-bottom:6px}
.meta p{color:var(--muted); font-size:.95rem}

.controls{
  display:flex; flex-wrap:wrap; gap:10px; margin:18px 0 26px;
}
.ctrl, select.ctrl{
  background:var(--glass); border:1px solid var(--border);
  padding:10px 14px; border-radius:12px; color:var(--text);
  font-weight:500; cursor:pointer; transition:.2s; font-family:inherit;
}
.ctrl:hover{transform:translateY(-2px); background:rgba(255,255,255,0.14)}

.reader{
  background:var(--glass); backdrop-filter:blur(16px) saturate(160%);
  border:1px solid var(--border); border-radius:var(--radius);
  padding:clamp(22px,4vw,42px); min-height:60vh;
  box-shadow:0 18px 40px rgba(0,0,0,0.25);
  transition:.3s;
}
.reader.distraction{border:0; background:transparent; padding:20px 0; box-shadow:none}
.reader p{font-size:1.18rem; line-height:1.9; margin-bottom:1.2em; max-width:70ch}
.reader mark{background:var(--accent); color:white; padding:2px 4px; border-radius:4px}

/* Bottom nav */
.bottom-nav{
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  display:flex; gap:10px; padding:12px 16px;
  background:var(--glass); backdrop-filter:blur(20px);
  border:1px solid var(--border); border-radius:999px; z-index:60
}

/* Highlight menu */
.highlight-menu{
  position:absolute; background:var(--glass); backdrop-filter:blur(16px);
  border:1px solid var(--border); border-radius:12px; padding:6px;
  display:none; gap:6px; z-index:100
}
.highlight-menu button{width:28px; height:28px; border-radius:8px; border:0; cursor:pointer}

.skeleton{
  background:linear-gradient(90deg,transparent,var(--glass),transparent);
  background-size:200% 100%; animation:shimmer 1.5s infinite;
  border-radius:12px; min-height:400px;
}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

footer{padding:40px 0 60px; text-align:center; color:var(--muted); font-size:.9rem}

@media(max-width:640px){
  :root{--size:18px}
 .reader p{font-size:1.08rem; line-height:1.8}
 .topbar{padding:12px 14px}
</style>
</head>
<body>

<div class="topbar" id="topbar">
  <div class="logo">PaceWave</div>
  <div class="top-actions">
    <button class="icon-btn" onclick="toggleTheme()" title="Theme">🌓</button>
    <button class="icon-btn" onclick="toggleDistraction()" title="Distraction Free">⛶</button>
    <button class="icon-btn" onclick="saveBookmark()" title="Bookmark">🔖</button>
    <a class="btn" href="index.html">← Library</a>
  </div>
</div>

<div class="progress-wrap"><div class="progress" id="progress"></div></div>
<div class="prog-text"><span id="progressPercent">0%</span> • <span id="chapterInfo">Chapter 1 of 3</span></div>

<main class="wrap">
  <div class="meta">
    <p id="bookAuthor">by Author</p>
    <h1 id="bookTitle">Book Title</h1>
    <p id="readTime" style="color:var(--accent)"></p>
  </div>

  <div class="controls">
    <select class="ctrl" id="chapterSelect" onchange="loadChapter()"></select>
    <select class="ctrl" id="fontSelect" onchange="changeFont()">
      <option value="Inter">Inter</option>
      <option value="Merriweather">Merriweather</option>
      <option value="Playfair Display">Playfair</option>
    </select>
    <input type="range" min="16" max="24" value="18" class="ctrl" id="sizeSlider" oninput="changeSize(this.value)">
    <input type="text" placeholder="Search..." class="ctrl" id="searchBox" oninput="searchText(this.value)">
  </div>

  <article class="reader skeleton" id="content"></article>
</main>

<div class="bottom-nav">
  <button class="btn" onclick="prevChapter()">← Prev</button>
  <button class="btn" onclick="showBookmarks()">📑</button>
  <button class="btn" onclick="nextChapter()">Next →</button>
</div>

<div class="highlight-menu" id="highlightMenu">
  <button style="background:#8A2BE2" onclick="highlight('#8A2BE2')"></button>
  <button style="background:#fbbf24" onclick="highlight('#fbbf24')"></button>
  <button style="background:#34d399" onclick="highlight('#34d399')"></button>
</div>

<footer>© 2026 PaceWave • Premium reading experience</footer>

<script>
// Book data - add your books here
const library = [
  {
    id: 0,
    title: "Atomic Habits",
    author: "James Clear",
    chapters: [
      {name:"Chapter 1: The Power of Tiny Gains", text:"Habits are the compound interest of self-improvement. You do not rise to the level of your goals. You fall to the level of your systems. Small changes, repeated daily, create remarkable results over time. ".repeat(40)},
      {name:"Chapter 2: Make it Obvious", text:"The 1st Law: Make it Obvious. Stack your new habit on top of an existing one. Implementation intention: I will [BEHAVIOR] at [TIME] in [LOCATION]. Design your environment to make good habits effortless. ".repeat(40)},
      {name:"Chapter 3: Make it Attractive", text:"The 2nd Law: Make it Attractive. Join a culture where your desired behavior is normal. Temptation bundling: pair an action you want with an action you need. ".repeat(40)}
    ]
  },
  {
    id: 1,
    title: "The Art of Focus",
    author: "Marina Wells",
    chapters: [
      {name:"Chapter 1: Attention", text:"Focus is not about saying yes to more. It's about saying no to everything that doesn't align with the life you want to build. The modern world rewards distraction, but mastery rewards attention. ".repeat(40)},
      {name:"Chapter 2: Environment", text:"Your environment shapes your habits. Design it like a product. Put the book on your pillow. Put your phone in another room. Make the right choice the easy choice. ".repeat(40)}
    ]
  }
];

let currentBook = 0;
let currentChapter = 0;
let selectedText = "";
let lastScrollY = 0;

// Init
function init(){
  // Get book from URL?book=0
  const params = new URLSearchParams(location.search);
  currentBook = parseInt(params.get('book')) || 0;
  const book = library[currentBook];

  document.getElementById('bookTitle').innerText = book.title;
  document.getElementById('bookAuthor').innerText = 'by ' + book.author;

  // Load chapters dropdown
  const select = document.getElementById('chapterSelect');
  book.chapters.forEach((ch,i) => {
    select.innerHTML += `<option value="${i}">${ch.name}</option>`;
  });

  // Restore settings
  document.documentElement.className = localStorage.getItem('pw_theme') || '';
  document.getElementById('fontSelect').value = localStorage.getItem('pw_font') || 'Inter';
  document.getElementById('sizeSlider').value = localStorage.getItem('pw_size') || '18';
  document.documentElement.style.setProperty('--font', localStorage.getItem('pw_font') || 'Inter');
  document.documentElement.style.setProperty('--size', (localStorage.getItem('pw_size') || '18') + 'px');

  loadChapter();
  updateReadTime();
}

function loadChapter(){
  currentChapter = parseInt(document.getElementById('chapterSelect').value);
  const book = library[currentBook];
  const content = document.getElementById('content');
  content.classList.add('skeleton');

  setTimeout(() => {
    content.classList.remove('skeleton');
    content.innerText = book.chapters[currentChapter].text;
    updateChapterInfo();
    restoreProgress();
  }, 200);
}

function nextChapter(){
  const book = library[currentBook];
  if(currentChapter < book.chapters.length - 1){
    currentChapter++;
    document.getElementById('chapterSelect').value = currentChapter;
    loadChapter();
  }
}
function prevChapter(){
  if(currentChapter > 0){
    currentChapter--;
    document.getElementById('chapterSelect').value = currentChapter;
    loadChapter();
  }
}

// Typography
function changeFont(){
  const font = document.getElementById('fontSelect').value;
  document.documentElement.style.setProperty('--font', font);
  localStorage.setItem('pw_font', font);
}
function changeSize(size){
  document.documentElement.style.setProperty('--size', size + 'px');
  localStorage.setItem('pw_size', size);
}

// Theme: Dark -> Light -> Sepia
function toggleTheme(){
  const themes = ['', 'light', 'sepia'];
  let idx = themes.indexOf(document.documentElement.className);
  idx = (idx + 1) % 3;
  document.documentElement.className = themes[idx];
  localStorage.setItem('pw_theme', themes[idx]);
}

// Distraction free
function toggleDistraction(){
  document.getElementById('content').classList.toggle('distraction');
  document.getElementById('topbar').classList.toggle('hide');
}

// Progress + auto-save
function saveProgress(){
  const key = `pw_progress_${currentBook}_ch${currentChapter}`;
  localStorage.setItem(key, scrollY);
}
function restoreProgress(){
  const key = `pw_progress_${currentBook}_ch${currentChapter}`;
  const pos = localStorage.getItem(key);
  if(pos) setTimeout(() => scrollTo(0, parseInt(pos)), 100);
}

addEventListener('scroll', () => {
  const h = document.documentElement.scrollHeight - innerHeight;
  const pct = h > 0? Math.round((scrollY / h) * 100) : 0;
  document.getElementById('progress').style.width = pct + '%';
  document.getElementById('progressPercent').innerText = pct + '%';

  if(scrollY > lastScrollY && scrollY > 100) document.getElementById('topbar').classList.add('hide');
  else document.getElementById('topbar').classList.remove('hide');
  lastScrollY = scrollY;

  clearTimeout(window.saveTimeout);
  window.saveTimeout = setTimeout(saveProgress, 2000);
});

function updateChapterInfo(){
  const book = library[currentBook];
  document.getElementById('chapterInfo').innerText = `Chapter ${currentChapter + 1} of ${book.chapters.length}`;
}
function updateReadTime(){
  const book = library[currentBook];
  const words = book.chapters.reduce((t,ch) => t + ch.text.split(' ').length, 0);
  document.getElementById('readTime').innerText = Math.ceil(words/200) + ' min read';
}

// Search
function searchText(query){
  const book = library[currentBook];
  const content = document.getElementById('content');
  let text = book.chapters[currentChapter].text;
  if(query){
    const regex = new RegExp(`(${query})`, 'gi');
    content.innerHTML = text.replace(regex, '<mark>$1</mark>');
  } else {
    content.innerText = text;
  }
}

// Bookmarks + Highlights
function saveBookmark(){
  const key = `pw_bookmark_${currentBook}_ch${currentChapter}`;
  localStorage.setItem(key, scrollY);
  alert('Bookmark saved at current position');
}
function showBookmarks(){
  let list = [];
  const book = library[currentBook];
  for(let i=0; i<book.chapters.length; i++){
    const bm = localStorage.getItem(`pw_bookmark_${currentBook}_ch${i}`);
    if(bm) list.push(`Chapter ${i+1}`);
  }
  alert(list.length? 'Bookmarks: ' + list.join(', ') : 'No bookmarks yet');
}

document.addEventListener('mouseup', (e) => {
  selectedText = window.getSelection().toString().trim();
  const menu = document.getElementById('highlightMenu');
  if(selectedText){
    menu.style.display = 'flex';
    menu.style.top = e.pageY + 10 + 'px';
    menu.style.left = e.pageX - 50 + 'px';
  } else {
    menu.style.display = 'none';
  }
});
function highlight(color){
  document.execCommand('backColor', false, color);
  document.getElementById('highlightMenu').style.display = 'none';
}

init();
</script>
</body>
  </html>
